<div class="login-wrapper">
    <mat-card>
        <mat-card-title>Rejestracja</mat-card-title>
        <mat-card-content>
            <form [formGroup]="formGroup" (ngSubmit)="onSubmit()">
                <mat-form-field>
                    <input
                        type="email"
                        matInput
                        placeholder="Email"
                        formControlName="email"
                    />
                    <mat-error *ngIf="email.invalid && email.errors.required">
                        Wprowadź email
                    </mat-error>
                    <mat-error *ngIf="email.invalid && email.errors.email">
                        Niepoprawny adres email
                    </mat-error>
                    <mat-error *ngIf="email.invalid && email.errors.taken">
                        Podany adres email jest już zajęty
                    </mat-error>
                </mat-form-field>

                <mat-form-field>
                    <input
                        type="password"
                        matInput
                        placeholder="Hasło"
                        formControlName="password"
                    />
                    <mat-error *ngIf="password.invalid && password.errors.required">
                        Wprowadź hasło
                    </mat-error>
                </mat-form-field>

                <mat-form-field>
                    <input
                        type="password"
                        matInput
                        placeholder="Potwierdź hasło"
                        formControlName="repassword"
                    />
                    <mat-error *ngIf="repassword.invalid && repassword.errors.required">
                        Wprowadź hasło
                    </mat-error>
                    <mat-error *ngIf="repassword.invalid && repassword.errors.mismatch">
                        Wprowadzone hasła różnią się
                    </mat-error>
                </mat-form-field>

                <mat-form-field>
                    <input
                        type="text"
                        matInput
                        placeholder="Nick"
                        formControlName="nick"
                    />
                    <mat-error *ngIf="nick.invalid && nick.errors.required">
                        Wprowadź nick
                    </mat-error>
                </mat-form-field>

                <button type="submit" class="size-normal" mat-raised-button color="primary">
                    Zarejestruj
                </button>
            </form>
        </mat-card-content>
    </mat-card>
</div>
